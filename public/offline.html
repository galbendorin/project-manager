<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PM Workspace Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 34rem);
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: white;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        padding: 32px 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PM Workspace is offline</h1>
      <p>Open the app once while connected so this device can cache the latest workspace. After that, Shopping List, Timesheet, and recently opened work will stay available offline.</p>
    </main>
  </body>
  </html>
